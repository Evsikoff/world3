<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Игра: Слова на букву У</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Слова на букву "У"</h1>
        <p>Заполните все строки существительными в именительном падеже, единственном числе.</p>
    </header>
    
    <main>
        <div id="game-board"></div>
    </main>

    <div id="victory-modal" class="modal hidden">
        <div class="modal-content">
            <h2>Поздравляем!</h2>
            <p>Вы успешно заполнили все строчки!</p>
            <button id="restart-btn">Начать заново</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
